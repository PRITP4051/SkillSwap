<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Explore Skills - SkillSwap</title>
  <meta name="description" content="Browse skills from fellow students. Find exactly what you need to learn.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="page-wrapper">
    <!-- Navbar -->
    <nav class="navbar">
      <div class="container">
        <a href="index.html" class="logo">SkillSwap</a>
        <button class="mobile-menu-btn" aria-label="Toggle menu">
          <span></span>
          <span></span>
          <span></span>
        </button>
        <div class="nav-links">
          <a href="index.html">Home</a>
          <a href="explore.html" class="active">Explore Skills</a>
          <a href="login.html">Login</a>
          <a href="signup.html">Signup</a>
        </div>
      </div>
    </nav>

    <main class="main-content">
      <div class="container">
        <h1 style="margin-bottom: 0.5rem;">Explore Skills</h1>
        <p style="margin-bottom: 2rem;">Find the perfect skill to learn from fellow students</p>
        
        <!-- Search Bar -->
        <div class="search-bar">
          <input type="text" id="search-input" class="form-input" placeholder="Search skills...">
          <button class="btn btn-primary" onclick="performSearch()">Search</button>
        </div>

        <!-- Results Count -->
        <p id="results-count" style="margin-bottom: 1rem; color: var(--text-secondary);"></p>

        <!-- Skills Grid -->
        <div id="skills-grid" class="skills-grid">
          <!-- Skills will be rendered here -->
        </div>

        <!-- Empty State -->
        <div id="empty-state" class="empty-state hidden">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
          <h3>No skills found</h3>
          <p>Try a different search term or check back later for new listings.</p>
        </div>
      </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
      <div class="container">
        <div class="footer-bottom">
          <p>2025 SkillSwap. All rights reserved.</p>
        </div>
      </div>
    </footer>
  </div>

  <!-- Teacher Profile Modal -->
  <div id="teacher-modal" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modal-teacher-name">Teacher Name</h3>
        <button class="modal-close" onclick="closeTeacherModal()">&times;</button>
      </div>
      <div id="modal-teacher-content">
        <!-- Teacher info will be rendered here -->
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    const currentUser = getCurrentUser();
    
    // Load all listings on page load
    loadListings();
    
    // Search on enter key
    document.getElementById('search-input').addEventListener('keyup', function(e) {
      if (e.key === 'Enter') {
        performSearch();
      }
      // Live search as user types
      performSearch();
    });

    /**
     * Perform search
     */
    function performSearch() {
      const query = document.getElementById('search-input').value;
      const listings = searchListings(query);
      renderListings(listings);
    }

    /**
     * Load all listings
     */
    function loadListings() {
      const listings = getAllListings();
      renderListings(listings);
    }

    /**
     * Render listings to the grid
     */
    function renderListings(listings) {
      const grid = document.getElementById('skills-grid');
      const emptyState = document.getElementById('empty-state');
      const resultsCount = document.getElementById('results-count');
      
      if (listings.length === 0) {
        grid.innerHTML = '';
        emptyState.classList.remove('hidden');
        resultsCount.textContent = '';
        return;
      }
      
      emptyState.classList.add('hidden');
      resultsCount.textContent = `${listings.length} skill${listings.length !== 1 ? 's' : ''} available`;
      
      grid.innerHTML = listings.map(listing => {
        const teacherRating = getTeacherRating(listing.teacherId);
        const reviewCount = getTeacherReviews(listing.teacherId).length;
        const ratingDisplay = reviewCount > 0 ? 
          `${renderStars(Math.round(teacherRating))} ${teacherRating} (${reviewCount})` : 
          '<span style="color: var(--text-secondary);">No reviews yet</span>';
        
        return `
          <div class="card skill-card">
            <h4 class="card-title">${escapeHtml(listing.title)}</h4>
            <p class="card-description">${escapeHtml(listing.description)}</p>
            <p class="skill-price">$${listing.price.toFixed(2)} / session</p>
            <p class="skill-teacher">
              <a href="#" onclick="showTeacherProfile('${listing.teacherId}'); return false;" style="color: var(--primary);">
                ${escapeHtml(listing.teacherName)}
              </a>
            </p>
            <p style="font-size: 0.875rem; margin-bottom: 1rem;">${ratingDisplay}</p>
            <button class="btn btn-primary" onclick="bookSession('${listing.id}')">Book Session</button>
          </div>
        `;
      }).join('');
    }

    /**
     * Book a session
     */
    function bookSession(listingId) {
      if (!currentUser) {
        showAlert('Please login to book a session', 'error');
        setTimeout(() => {
          window.location.href = 'login.html';
        }, 1500);
        return;
      }
      
      const booking = createBooking(listingId);
      
      if (booking) {
        showAlert('Session booked successfully! Check your dashboard for details.', 'success');
      }
    }

    /**
     * Show teacher profile modal
     */
    function showTeacherProfile(teacherId) {
      const teacher = getUserById(teacherId);
      if (!teacher) {
        showAlert('Teacher not found', 'error');
        return;
      }
      
      const rating = getTeacherRating(teacherId);
      const reviews = getTeacherReviews(teacherId);
      const listings = getListingsByTeacher(teacherId);
      
      document.getElementById('modal-teacher-name').textContent = teacher.name;
      
      let content = `
        <div style="margin-bottom: 1.5rem;">
          <p style="margin-bottom: 0.5rem;"><strong>Email:</strong> ${escapeHtml(teacher.email)}</p>
          ${reviews.length > 0 ? `
            <p style="margin-bottom: 0.5rem;">
              <strong>Rating:</strong> ${renderStars(Math.round(rating))} ${rating} (${reviews.length} reviews)
            </p>
          ` : ''}
          ${teacher.bio ? `<p style="margin-bottom: 0.5rem;"><strong>Bio:</strong> ${escapeHtml(teacher.bio)}</p>` : ''}
        </div>
      `;
      
      if (teacher.skillsTeach && teacher.skillsTeach.length > 0) {
        content += `
          <div style="margin-bottom: 1.5rem;">
            <h4 style="margin-bottom: 0.5rem;">Skills</h4>
            <div class="tags">
              ${teacher.skillsTeach.map(s => `<span class="tag tag-primary">${escapeHtml(s)}</span>`).join('')}
            </div>
          </div>
        `;
      }
      
      if (listings.length > 0) {
        content += `
          <div style="margin-bottom: 1.5rem;">
            <h4 style="margin-bottom: 0.5rem;">Available Sessions (${listings.length})</h4>
            ${listings.map(l => `
              <div class="card" style="margin-bottom: 0.5rem; padding: 1rem;">
                <strong>${escapeHtml(l.title)}</strong> - $${l.price.toFixed(2)}
              </div>
            `).join('')}
          </div>
        `;
      }
      
      if (reviews.length > 0) {
        content += `
          <div>
            <h4 style="margin-bottom: 0.5rem;">Recent Reviews</h4>
            ${reviews.slice(0, 3).map(r => `
              <div class="card review-card" style="margin-bottom: 0.5rem;">
                <div class="review-header">
                  <span class="review-author">${escapeHtml(r.studentName)}</span>
                  ${renderStars(r.rating)}
                </div>
                <p>${escapeHtml(r.comment)}</p>
              </div>
            `).join('')}
          </div>
        `;
      }
      
      document.getElementById('modal-teacher-content').innerHTML = content;
      document.getElementById('teacher-modal').classList.remove('hidden');
    }

    /**
     * Close teacher modal
     */
    function closeTeacherModal() {
      document.getElementById('teacher-modal').classList.add('hidden');
    }

    // Close modal on overlay click
    document.getElementById('teacher-modal').addEventListener('click', function(e) {
      if (e.target === this) {
        closeTeacherModal();
      }
    });
  </script>
</body>
</html>
