<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - SkillSwap</title>
  <meta name="description" content="Create your SkillSwap account and start exchanging skills with fellow students.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="auth-page">
    <div class="card auth-card">
      <a href="index.html" class="logo" style="display: block; text-align: center; margin-bottom: 1.5rem;">SkillSwap</a>
      <h1>Create Account</h1>
      <p>Join the student skill marketplace</p>
      
      <form id="signup-form">
        <div class="form-group">
          <label for="name" class="form-label">Full Name</label>
          <input type="text" id="name" name="name" class="form-input" placeholder="Enter your name" required>
        </div>
        
        <div class="form-group">
          <label for="email" class="form-label">Email Address</label>
          <input type="email" id="email" name="email" class="form-input" placeholder="Enter your email" required>
        </div>
        
        <div class="form-group">
          <label for="password" class="form-label">Password</label>
          <input type="password" id="password" name="password" class="form-input" placeholder="Create a password" required minlength="6">
        </div>
        
        <div class="form-group">
          <label for="confirm-password" class="form-label">Confirm Password</label>
          <input type="password" id="confirm-password" name="confirm-password" class="form-input" placeholder="Confirm your password" required>
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%;">Create Account</button>
      </form>
      
      <div class="auth-footer">
        <p>Already have an account? <a href="login.html">Login</a></p>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    // Check if already logged in
    const currentUser = getCurrentUser();
    if (currentUser) {
      window.location.href = 'dashboard.html';
    }

    // Handle signup form submission
    document.getElementById('signup-form').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirm-password').value;
      
      // Validate inputs
      if (!name || !email || !password) {
        showAlert('Please fill in all fields', 'error');
        return;
      }
      
      if (password.length < 6) {
        showAlert('Password must be at least 6 characters', 'error');
        return;
      }
      
      if (password !== confirmPassword) {
        showAlert('Passwords do not match', 'error');
        return;
      }
      
      // Validate email format
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!emailRegex.test(email)) {
        showAlert('Please enter a valid email address', 'error');
        return;
      }
      
      // Register user
      const user = registerUser(name, email, password);
      
      if (user) {
        showAlert('Account created successfully!', 'success');
        setTimeout(() => {
          window.location.href = 'profile.html';
        }, 1000);
      }
    });
  </script>
</body>
</html>
