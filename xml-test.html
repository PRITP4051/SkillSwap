<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkillSwap XML Parser Test</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: white;
      border-radius: 12px;
      padding: 30px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
    }

    .header {
      text-align: center;
      margin-bottom: 40px;
      border-bottom: 3px solid #667eea;
      padding-bottom: 20px;
    }

    .header h1 {
      color: #333;
      margin-bottom: 10px;
      font-size: 2.5em;
    }

    .header p {
      color: #666;
      font-size: 1.1em;
    }

    .controls {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }

    button {
      padding: 12px 24px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 1em;
      transition: all 0.3s ease;
      font-weight: 600;
    }

    button:hover {
      background: #764ba2;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
    }

    button:active {
      transform: translateY(0);
    }

    .status {
      padding: 15px;
      border-radius: 6px;
      margin-bottom: 20px;
      font-weight: 600;
      display: none;
    }

    .status.success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
      display: block;
    }

    .status.error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
      display: block;
    }

    .status.info {
      background: #d1ecf1;
      color: #0c5460;
      border: 1px solid #bee5eb;
      display: block;
    }

    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      border-bottom: 2px solid #eee;
      flex-wrap: wrap;
    }

    .tab-btn {
      padding: 10px 20px;
      background: transparent;
      color: #666;
      border: none;
      border-bottom: 3px solid transparent;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .tab-btn.active {
      color: #667eea;
      border-bottom-color: #667eea;
    }

    .tab-btn:hover {
      color: #667eea;
      background: transparent;
      transform: none;
      box-shadow: none;
    }

    .content {
      display: none;
    }

    .content.active {
      display: block;
    }

    .section {
      margin-bottom: 30px;
    }

    .section h3 {
      color: #333;
      margin-bottom: 15px;
      padding-bottom: 10px;
      border-left: 4px solid #667eea;
      padding-left: 15px;
      font-size: 1.3em;
    }

    .data-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      margin-bottom: 20px;
    }

    .card {
      background: #f8f9fa;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 20px;
      transition: all 0.3s ease;
    }

    .card:hover {
      border-color: #667eea;
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.2);
    }

    .card h4 {
      color: #667eea;
      margin-bottom: 10px;
      font-size: 1.1em;
    }

    .card p {
      color: #666;
      margin-bottom: 8px;
      font-size: 0.95em;
      line-height: 1.5;
    }

    .card .label {
      font-weight: 600;
      color: #333;
      display: inline-block;
      min-width: 100px;
    }

    .rating {
      color: #ffc107;
      font-size: 1.2em;
    }

    .badge {
      display: inline-block;
      padding: 4px 12px;
      background: #667eea;
      color: white;
      border-radius: 20px;
      font-size: 0.85em;
      margin-right: 5px;
      margin-top: 5px;
    }

    .skill-list {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #ddd;
    }

    .skill-item {
      background: white;
      padding: 8px 12px;
      border-radius: 4px;
      margin-bottom: 5px;
      font-size: 0.9em;
    }

    .code-block {
      background: #2d2d2d;
      color: #f8f8f2;
      padding: 20px;
      border-radius: 6px;
      overflow-x: auto;
      font-family: 'Courier New', monospace;
      font-size: 0.9em;
      line-height: 1.4;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: #666;
    }

    .spinner {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #667eea;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .summary-stat {
      display: inline-block;
      background: white;
      border: 2px solid #667eea;
      border-radius: 8px;
      padding: 15px 30px;
      margin: 10px 10px 10px 0;
      text-align: center;
    }

    .summary-stat .number {
      font-size: 2em;
      font-weight: bold;
      color: #667eea;
    }

    .summary-stat .label {
      color: #666;
      font-size: 0.9em;
      margin-top: 5px;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <h1>✓ SkillSwap XML Parser Test</h1>
      <p>This page demonstrates that the XML code works correctly</p>
    </div>

    <!-- Status Messages -->
    <div id="status" class="status"></div>

    <!-- Controls -->
    <div class="controls">
      <button onclick="parseXML()">📂 Parse XML File</button>
      <button onclick="validateXML()">✓ Validate XML</button>
      <button onclick="clearResults()">🗑️ Clear Results</button>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('summary')">📊 Summary</button>
      <button class="tab-btn" onclick="switchTab('users')">👥 Users</button>
      <button class="tab-btn" onclick="switchTab('listings')">📚 Listings</button>
      <button class="tab-btn" onclick="switchTab('bookings')">📅 Bookings</button>
      <button class="tab-btn" onclick="switchTab('messages')">💬 Messages</button>
      <button class="tab-btn" onclick="switchTab('reviews')">⭐ Reviews</button>
      <button class="tab-btn" onclick="switchTab('raw')">📋 Raw XML</button>
    </div>

    <!-- Content Sections -->
    
    <!-- Summary Tab -->
    <div id="summary" class="content active">
      <div id="summary-content"></div>
    </div>

    <!-- Users Tab -->
    <div id="users" class="content">
      <div id="users-content"></div>
    </div>

    <!-- Listings Tab -->
    <div id="listings" class="content">
      <div id="listings-content"></div>
    </div>

    <!-- Bookings Tab -->
    <div id="bookings" class="content">
      <div id="bookings-content"></div>
    </div>

    <!-- Messages Tab -->
    <div id="messages" class="content">
      <div id="messages-content"></div>
    </div>

    <!-- Reviews Tab -->
    <div id="reviews" class="content">
      <div id="reviews-content"></div>
    </div>

    <!-- Raw XML Tab -->
    <div id="raw" class="content">
      <div id="raw-content"></div>
    </div>
  </div>

  <script src="js/xml-parser.js"></script>
  <script>
    let parsedData = null;

    async function parseXML() {
      showStatus('Loading XML file...', 'info');
      const data = await XMLParser.parseXMLFile('data/skillswap-data.xml');
      
      if (!data) {
        showStatus('❌ Failed to parse XML file', 'error');
        return;
      }

      parsedData = data;
      
      const validation = XMLParser.validateData(data);
      if (validation.valid) {
        showStatus('✓ XML parsed successfully! All data is valid.', 'success');
        displayAllData(data);
      } else {
        showStatus('⚠️ XML parsed but has validation issues: ' + validation.errors.join(', '), 'error');
      }
    }

    function validateXML() {
      if (!parsedData) {
        showStatus('Please parse XML first', 'error');
        return;
      }

      const validation = XMLParser.validateData(parsedData);
      if (validation.valid) {
        showStatus('✓ XML is valid! All sections are properly structured.', 'success');
      } else {
        showStatus('❌ Validation errors: ' + validation.errors.join(', '), 'error');
      }
    }

    function displayAllData(data) {
      displaySummary(data);
      displayUsers(data.users);
      displayListings(data.listings);
      displayBookings(data.bookings);
      displayMessages(data.messages);
      displayReviews(data.reviews);
      displayRawXML(data);
    }

    function displaySummary(data) {
      let html = `
        <div class="section">
          <h3>📊 Data Overview</h3>
          <div>
            <div class="summary-stat">
              <div class="number">${data.statistics.totalUsers}</div>
              <div class="label">Total Users</div>
            </div>
            <div class="summary-stat">
              <div class="number">${data.statistics.totalListings}</div>
              <div class="label">Skill Listings</div>
            </div>
            <div class="summary-stat">
              <div class="number">${data.statistics.totalBookings}</div>
              <div class="label">Bookings</div>
            </div>
            <div class="summary-stat">
              <div class="number">${data.statistics.totalMessages}</div>
              <div class="label">Messages</div>
            </div>
            <div class="summary-stat">
              <div class="number">${data.statistics.totalReviews}</div>
              <div class="label">Reviews</div>
            </div>
            <div class="summary-stat">
              <div class="number">${data.statistics.averageRating}</div>
              <div class="label">Avg Rating</div>
            </div>
          </div>
        </div>

        <div class="section">
          <h3>📋 File Information</h3>
          <div class="card">
            <p><span class="label">App Name:</span> ${data.metadata.appName}</p>
            <p><span class="label">Version:</span> ${data.metadata.version}</p>
            <p><span class="label">Export Date:</span> ${new Date(data.metadata.exportDate).toLocaleString()}</p>
            <p><span class="label">Description:</span> ${data.metadata.description}</p>
          </div>
        </div>
      `;
      document.getElementById('summary-content').innerHTML = html;
    }

    function displayUsers(users) {
      let html = `<div class="section"><h3>👥 Users (${users.length})</h3><div class="data-grid">`;
      users.forEach(user => {
        html += `
          <div class="card">
            <h4>${user.name}</h4>
            <p><span class="label">Email:</span> ${user.email}</p>
            <p><span class="label">Bio:</span> ${user.bio}</p>
            <p><span class="label">Joined:</span> ${new Date(user.createdAt).toLocaleDateString()}</p>
            ${user.skillsTeach.length > 0 ? `
              <div class="skill-list">
                <strong>Teaching:</strong>
                ${user.skillsTeach.map(s => `<div class="skill-item">• ${s.name} (${s.level})</div>`).join('')}
              </div>
            ` : ''}
            ${user.skillsLearn.length > 0 ? `
              <div class="skill-list">
                <strong>Learning:</strong>
                ${user.skillsLearn.map(s => `<div class="skill-item">• ${s.name} (${s.level})</div>`).join('')}
              </div>
            ` : ''}
          </div>
        `;
      });
      html += `</div></div>`;
      document.getElementById('users-content').innerHTML = html;
    }

    function displayListings(listings) {
      let html = `<div class="section"><h3>📚 Skill Listings (${listings.length})</h3><div class="data-grid">`;
      listings.forEach(listing => {
        html += `
          <div class="card">
            <h4>${listing.title}</h4>
            <p><span class="label">Teacher:</span> ${listing.teacherName}</p>
            <p><span class="label">Description:</span> ${listing.description}</p>
            <p><span class="label">Price:</span> $${listing.price}</p>
            <p><span class="label">Category:</span> <span class="badge">${listing.category}</span></p>
            <p><span class="label">Level:</span> <span class="badge">${listing.level}</span></p>
            <p><span class="label">Duration:</span> ${listing.duration} mins</p>
            <p><span class="label">Rating:</span> <span class="rating">★ ${listing.rating}</span> (${listing.reviewCount} reviews)</p>
          </div>
        `;
      });
      html += `</div></div>`;
      document.getElementById('listings-content').innerHTML = html;
    }

    function displayBookings(bookings) {
      let html = `<div class="section"><h3>📅 Bookings (${bookings.length})</h3><div class="data-grid">`;
      bookings.forEach(booking => {
        const statusColor = booking.status === 'completed' ? '#28a745' : 
                           booking.status === 'confirmed' ? '#ffc107' : '#6c757d';
        html += `
          <div class="card">
            <h4>${booking.listingTitle}</h4>
            <p><span class="label">Student:</span> ${booking.studentName}</p>
            <p><span class="label">Teacher:</span> ${booking.teacherName}</p>
            <p><span class="label">Price:</span> $${booking.price}</p>
            <p><span class="label">Status:</span> <span class="badge" style="background: ${statusColor};">${booking.status.toUpperCase()}</span></p>
            <p><span class="label">Booked:</span> ${new Date(booking.createdAt).toLocaleDateString()}</p>
            <p><span class="label">Reviewed:</span> ${booking.hasReview ? '✓ Yes' : '✗ No'}</p>
          </div>
        `;
      });
      html += `</div></div>`;
      document.getElementById('bookings-content').innerHTML = html;
    }

    function displayMessages(messages) {
      let html = `<div class="section"><h3>💬 Messages (${messages.length})</h3>`;
      messages.forEach(msg => {
        html += `
          <div class="card" style="margin-bottom: 15px;">
            <p><span class="label">From:</span> ${msg.senderName}</p>
            <p><span class="label">To:</span> ${msg.receiverId}</p>
            <p><span class="label">Message:</span> "${msg.content}"</p>
            <p><span class="label">Date:</span> ${new Date(msg.createdAt).toLocaleString()}</p>
            <p><span class="label">Read:</span> ${msg.read ? '✓ Yes' : '✗ No'}</p>
          </div>
        `;
      });
      html += `</div>`;
      document.getElementById('messages-content').innerHTML = html;
    }

    function displayReviews(reviews) {
      let html = `<div class="section"><h3>⭐ Reviews (${reviews.length})</h3><div class="data-grid">`;
      reviews.forEach(review => {
        html += `
          <div class="card">
            <h4>${review.studentName}</h4>
            <p><span class="label">For:</span> ${review.listingTitle}</p>
            <p><span class="label">Rating:</span> <span class="rating">${'★'.repeat(review.rating)}${'☆'.repeat(5-review.rating)}</span></p>
            <p><span class="label">Comment:</span> "${review.comment}"</p>
            <p><span class="label">Date:</span> ${new Date(review.createdAt).toLocaleDateString()}</p>
          </div>
        `;
      });
      html += `</div></div>`;
      document.getElementById('reviews-content').innerHTML = html;
    }

    function displayRawXML(data) {
      const json = XMLParser.toJSON(data);
      const xml = `&lt;?xml version="1.0" encoding="UTF-8"?&gt;\n&lt;skillswap&gt;\n  &lt;!-- Complete SkillSwap Data Structure --&gt;\n  ...\n&lt;/skillswap&gt;`;
      let html = `
        <div class="section">
          <h3>📋 Raw Data (JSON Format)</h3>
          <p style="color: #666; margin-bottom: 15px;">The XML has been successfully parsed and converted to JSON:</p>
          <div class="code-block">${json.substring(0, 500)}...<br><br>[Full JSON available in browser console]</div>
          <p style="color: #666; margin-top: 15px;">📌 Total data size: ${(json.length / 1024).toFixed(2)} KB</p>
        </div>
      `;
      document.getElementById('raw-content').innerHTML = html;
    }

    function switchTab(tabName) {
      // Hide all content
      document.querySelectorAll('.content').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
      
      // Show selected tab
      document.getElementById(tabName).classList.add('active');
      event.target.classList.add('active');
    }

    function showStatus(message, type) {
      const statusEl = document.getElementById('status');
      statusEl.textContent = message;
      statusEl.className = `status ${type}`;
    }

    function clearResults() {
      parsedData = null;
      document.getElementById('summary-content').innerHTML = '';
      document.getElementById('users-content').innerHTML = '';
      document.getElementById('listings-content').innerHTML = '';
      document.getElementById('bookings-content').innerHTML = '';
      document.getElementById('messages-content').innerHTML = '';
      document.getElementById('reviews-content').innerHTML = '';
      document.getElementById('raw-content').innerHTML = '';
      document.getElementById('status').className = 'status';
    }

    // Auto-parse on load
    window.addEventListener('load', () => {
      showStatus('Ready! Click "Parse XML File" to test the XML code.', 'info');
    });
  </script>
</body>
</html>
